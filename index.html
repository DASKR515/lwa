<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LWA | Lua for Windows Redefined</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --glow: rgba(59,130,246,0.35);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 14px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg: #020408;
      --bg2: #070d14;
      --bg3: #0c1520;
      --border: rgba(59,130,246,0.15);
      --border2: rgba(255,255,255,0.06);
      --text: #f0f6ff;
      --text2: #7a90a8;
      --card: rgba(10,20,35,0.85);
      --nav-bg: rgba(2,4,8,0.85);
      --code-bg: #050e18;
    }

    [data-theme="light"] {
      --bg: #f0f4f8;
      --bg2: #e2eaf2;
      --bg3: #d4e0ec;
      --border: rgba(59,130,246,0.2);
      --border2: rgba(0,0,0,0.08);
      --text: #0a1628;
      --text2: #4a6080;
      --card: rgba(255,255,255,0.85);
      --nav-bg: rgba(240,244,248,0.9);
      --code-bg: #e8f0f8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 6%;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border2);
      transition: background var(--transition);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
    }

    .nav-logo-text {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .nav-logo-text span { color: var(--accent); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 0.88rem;
      font-family: var(--mono);
      transition: color var(--transition);
    }

    .nav-links a:hover { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Dark mode toggle */
    .theme-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all var(--transition);
    }

    .theme-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
      background: none;
      border: none;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all var(--transition);
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 65px; left: 0; right: 0;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border2);
      padding: 1.5rem 6%;
      flex-direction: column;
      gap: 1.2rem;
      z-index: 99;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: var(--text2);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.95rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border2);
      transition: color var(--transition);
    }

    .mobile-menu a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 6% 80px;
      position: relative;
      overflow: hidden;
    }

    /* Animated grid background */
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border2) 1px, transparent 1px),
        linear-gradient(90deg, var(--border2) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
      -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black, transparent);
    }

    /* Glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
      top: -100px; left: -100px;
      animation: drift 8s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,0.1), transparent 70%);
      bottom: -50px; right: -50px;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(30px, 20px); }
    }

    .hero-content { position: relative; z-index: 1; max-width: 820px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      animation: fadeDown 0.6s ease both;
    }

    .badge-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 20px;
      animation: fadeDown 0.6s 0.1s ease both;
    }

    h1 .hl { color: var(--accent); }
    h1 .hl2 { color: var(--accent2); }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text2);
      max-width: 580px;
      margin: 0 auto 36px;
      font-family: var(--mono);
      animation: fadeDown 0.6s 0.2s ease both;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
      animation: fadeDown 0.6s 0.3s ease both;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: white;
      padding: 14px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all var(--transition);
      box-shadow: 0 4px 24px rgba(59,130,246,0.4);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(59,130,246,0.55);
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--text);
      padding: 14px 32px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--border2);
      transition: all var(--transition);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 16px var(--glow);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
      animation: fadeDown 0.6s 0.4s ease both;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-right: 1px solid var(--border2);
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text2);
    }

    .stat-item:last-child { border-right: none; }
    .stat-item i { color: var(--accent); font-size: 0.75rem; }

    /* ── SECTION BASE ── */
    section {
      padding: 90px 6%;
      position: relative;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 14px;
    }

    .section-desc {
      color: var(--text2);
      font-size: 1rem;
      max-width: 600px;
      font-family: var(--mono);
      margin-bottom: 56px;
    }

    /* ── PROBLEM/SOLUTION ── */
    #about {
      background: var(--bg2);
    }

    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 48px;
    }

    .split-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }

    .split-card:hover {
      transform: translateY(-4px);
      border-color: var(--border);
    }

    .split-card.accent-card {
      border-color: rgba(59,130,246,0.4);
    }

    .split-card.accent-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .card-icon {
      width: 48px; height: 48px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .split-card h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .split-card p {
      color: var(--text2);
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.8;
    }

    .split-card code {
      background: var(--code-bg);
      color: var(--accent2);
      padding: 2px 7px;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 0.85em;
    }

    /* ── HOW IT WORKS ── */
    #how {
      background: var(--bg);
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 48px;
    }

    .step {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      transition: all var(--transition);
    }

    .step:hover {
      border-color: var(--border);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }

    .step-num {
      font-family: var(--mono);
      font-size: 2.5rem;
      font-weight: 700;
      color: rgba(59,130,246,0.15);
      line-height: 1;
      margin-bottom: 1rem;
    }

    .step h4 {
      font-size: 1rem;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    .step p {
      color: var(--text2);
      font-family: var(--mono);
      font-size: 0.83rem;
      line-height: 1.7;
    }

    /* ── LIBRARIES ── */
    #libraries {
      background: var(--bg2);
    }

    .libs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 48px;
    }

    .lib-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
      cursor: default;
    }

    .lib-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--glow);
    }

    .lib-icon {
      width: 36px; height: 36px;
      background: rgba(59,130,246,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--accent);
      flex-shrink: 0;
    }

    .lib-info h5 {
      font-family: var(--mono);
      font-size: 0.82rem;
      margin-bottom: 4px;
      color: var(--text);
    }

    .lib-info p {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text2);
      line-height: 1.5;
    }

    /* Special IUP card */
    .lib-card.featured {
      grid-column: span 2;
      border-color: rgba(59,130,246,0.3);
      background: linear-gradient(135deg, rgba(59,130,246,0.05), var(--card));
      position: relative;
      overflow: hidden;
    }

    .lib-card.featured::after {
      content: 'GUI Ready';
      position: absolute;
      top: 12px; right: 12px;
      font-family: var(--mono);
      font-size: 0.65rem;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }



    /* ── GOALS ── */
    #goals {
      background: var(--bg2);
    }

    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 48px;
    }

    .goal-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 2rem;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .goal-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0);
      transition: transform var(--transition);
    }

    .goal-card:hover::before { transform: scaleX(1); }

    .goal-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    }

    .goal-tag {
      font-family: var(--mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .tag-done { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    .tag-soon { background: rgba(59,130,246,0.1); color: var(--accent); border: 1px solid var(--border); }
    .tag-future { background: rgba(168,85,247,0.1); color: #a855f7; border: 1px solid rgba(168,85,247,0.2); }

    .goal-card h4 { font-size: 1rem; margin-bottom: 0.6rem; }
    .goal-card p { color: var(--text2); font-family: var(--mono); font-size: 0.83rem; line-height: 1.7; }

    /* ── INSTALL ── */
    #install {
      background: var(--bg);
    }

    .install-box {
      max-width: 720px;
      margin: 48px auto 0;
    }

    .install-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border2);
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-family: var(--mono);
      font-size: 0.82rem;
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all var(--transition);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      display: none;
      background: var(--code-bg);
      border: 1px solid var(--border2);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 1.5rem;
    }

    .tab-content.active { display: block; }

    .cmd-line {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 10px;
    }

    .cmd-line:last-child { margin-bottom: 0; }

    .prompt { color: var(--accent); }

    .copy-btn {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 1rem;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .copy-btn:hover {
      background: rgba(59,130,246,0.2);
      box-shadow: 0 0 12px var(--glow);
    }

    /* ── FOOTER ── */
    footer {
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      padding: 48px 6%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .footer-left p {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text2);
      margin-top: 8px;
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      color: var(--text2);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 0.82rem;
      transition: color var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .footer-links a:hover { color: var(--accent); }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: tran
